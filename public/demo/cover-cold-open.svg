<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" role="img" aria-labelledby="title desc">
  <title id="title">Cold Open cover art</title>
  <desc id="desc">Warm orange chapter artwork for the cold open segment.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2d1b0f" />
      <stop offset="100%" stop-color="#d86f2d" />
    </linearGradient>
  </defs>
  <rect width="1200" height="1200" fill="url(#bg)" />
  <circle cx="845" cy="320" r="180" fill="#f7c48a" opacity="0.92" />
  <rect x="84" y="808" width="1032" height="7" rx="3.5" fill="#f9dfbf" opacity="0.8" />
  <text x="84" y="930" fill="#fff8ee" font-family="Georgia, serif" font-size="130">Cold Open</text>
  <text x="88" y="1020" fill="#f7dcc2" font-family="Arial, sans-serif" font-size="42" letter-spacing="7">VTT CHAPTERS IN PRACTICE</text>
</svg>
